<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>LIMS self-check</title></head>
<body>
<pre id="out"></pre>
<div id="toast-container" style="display:none"></div>
<script src="utils.js"></script>
<script src="db.js"></script>
<script>
// ponytail: smoke test for the non-trivial bits (Ct→resultado logic, DB CRUD roundtrip).
// No framework, run by opening this file directly in a browser.
const results = [];
function check(label, cond) { results.push(`${cond ? 'PASS' : 'FAIL'} — ${label}`); }

// Ct cutoff logic (sin incertidumbre, debe igualar la regla original)
check('Ct obtenido == cutoff => POSITIVO', Utils.calculateResult(35, 35) === 'POSITIVO');
check('Ct obtenido < cutoff => POSITIVO', Utils.calculateResult(30, 35) === 'POSITIVO');
check('Ct obtenido > cutoff => NEGATIVO', Utils.calculateResult(36, 35) === 'NEGATIVO');
check('Ct vacío => null', Utils.calculateResult('', 35) === null);

// Zona gris (incertidumbre inferior/superior)
check('Ct dentro de zona gris => OBSERVAR', Utils.calculateResult(35.5, 35, 1, 1) === 'OBSERVAR');
check('Ct justo bajo el límite inferior => POSITIVO', Utils.calculateResult(34, 35, 1, 1) === 'POSITIVO');
check('Ct justo sobre el límite superior => NEGATIVO', Utils.calculateResult(36.1, 35, 1, 1) === 'NEGATIVO');
check('Ct en el borde superior de la zona gris => OBSERVAR', Utils.calculateResult(36, 35, 1, 1) === 'OBSERVAR');

// localStorage reset for a clean run
localStorage.removeItem('lims_cases_v1');
localStorage.removeItem('lims_pathologies_v1');
DB.init();

const pathologies = DB.pathologies.getAll();
check('Seed carga 9 patologías', pathologies.length === 9);

const srs = pathologies.find((p) => p.name.includes('SRS'));
check('Seed incluye SRS con Ct de corte 35', srs && srs.ctCutoff === 35);

const created = DB.cases.create({
  caseNumber: 'TEST-001',
  date: '2026-07-07',
  client: 'Cliente Test',
  sampleCount: 5,
  status: 'Pendiente',
  observations: '',
  pathologies: [{ pathologyId: srs.id, name: srs.name, ctCutoff: srs.ctCutoff, ctObtained: 30, result: 'POSITIVO', observations: '' }],
});
check('DB.cases.create persiste y devuelve id', !!created.id);
check('DB.cases.getAll refleja el caso creado', DB.cases.getAll().length === 1);

DB.cases.update(created.id, { status: 'Finalizado' });
check('DB.cases.update persiste cambios', DB.cases.getById(created.id).status === 'Finalizado');

DB.cases.remove(created.id);
check('DB.cases.remove elimina el caso', DB.cases.getAll().length === 0);

// limpieza para no dejar datos de prueba en el storage real
localStorage.removeItem('lims_cases_v1');
localStorage.removeItem('lims_pathologies_v1');

document.getElementById('out').textContent = results.join('\n') +
  `\n\n${results.every((r) => r.startsWith('PASS')) ? 'TODO OK' : 'HAY FALLOS'}`;
</script>
</body>
</html>
